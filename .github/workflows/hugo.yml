name: Hugo Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.164.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed site
        run: |
          base="${{ steps.deployment.outputs.page_url }}"
          base="${base%/}"

          check_path() {
            local path="$1"
            local url="${base}${path}"
            local tag="[${path}]"
            for i in 1 2 3 4 5; do
              # `|| echo 000` keeps a connection-level curl failure (DNS not
              # yet resolvable, connection refused) from tripping the job's
              # `set -e` and aborting this path's retry loop early.
              code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
              if [ "$code" = "200" ]; then
                echo "$tag $url responded 200 OK"
                return 0
              fi
              echo "$tag $url attempt $i: got HTTP $code, retrying in 10s..."
              sleep 10
            done
            echo "$tag $url did not return 200 after deploy" >&2
            return 1
          }

          # Run all paths concurrently so total wall-clock stays ~1 path's
          # worth of retries (~50s worst case) instead of summing serially
          # across all 6 (~300s worst case).
          # "/topics/gaming/" (plan 0002 / D6) stands in for the whole
          # /topics/<bucket>/ family -- Gaming is guaranteed non-empty (the
          # largest bucket by post count), so it's the one bucket page that
          # can never legitimately 404 as the corpus's topic assignments
          # evolve.
          paths=("/" "/tags/" "/archives/" "/search/" "/topics/gaming/" "/graph/")
          pids=()
          for path in "${paths[@]}"; do
            check_path "$path" &
            pids+=("$!")
          done

          status=0
          for pid in "${pids[@]}"; do
            wait "$pid" || status=1
          done
          exit "$status"
