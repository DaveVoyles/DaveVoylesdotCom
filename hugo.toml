baseURL = 'https://davevoyles.com/'
locale = 'en-us'
title = 'Dave Voyles'
theme = 'PaperMod'

[outputs]
home = ['HTML', 'RSS', 'JSON', 'GraphData']

[outputFormats.GraphData]
mediaType = "application/json"
baseName = "graph-data"
isPlainText = true
notAlone = true

# Declaring a custom taxonomy replaces Hugo's built-in defaults entirely, so
# tag/category must be re-listed here too, or /tags/ and /categories/ stop
# being generated (plan 0002 / D5). `topic` (singular) -> `topics` (plural,
# the front-matter field name D1/D2 write) auto-generates /topics/<bucket>/
# archive pages -- deliberately not added to [[menu.main]] below (plan's
# Out of Scope: footer-linked only, per D5's acceptance criteria).
[taxonomies]
tag = 'tags'
category = 'categories'
topic = 'topics'
# Vault notes get their own classification vocabulary, separate from
# `topics` (plan 0004 / D4, ADR 0007): `topics`' 6 buckets were designed to
# classify blog posts at a coarse level, not atomic reference-style vault
# notes. `vaultTopic` (singular front-matter field) -> `vaultTopics`
# (plural, /vaulttopics/<bucket>/) -- scoped to content/vault/*.md only by
# convention (nothing stops a post from setting it, but nothing does).
vaultTopic = 'vaultTopics'

# Related Content (plan 0002 / D3): relatedness is computed from the curated
# `topics` front-matter field (plan 0002 / D1-D2), not the fine-grained
# legacy `tags`/`categories` -- those stay untouched as data but aren't a
# good cross-post relatedness signal on their own (see the plan's Problem
# Statement). A single index keeps scoring simple: two posts either share a
# topic bucket or they don't, so a low threshold is deliberate -- with only
# 6 curated buckets, any shared bucket is already a meaningful signal and
# doesn't need a high score to surface.
[related]
threshold = 10
includeNewer = true
toLower = true
[[related.indices]]
name = 'topics'
weight = 100

[params]
author = 'Dave Voyles'
description = 'Blog by Dave Voyles'

# Site-wide TOC default (plan 0004 / D3): `.Param "ShowToc"` in
# layouts/single.html checks page frontmatter first, falling back to this
# site param -- so this activates the sticky/scroll-spy TOC rail (D2/D3)
# on all 76 existing posts without editing any of them. A post can still
# opt out individually with `ShowToc = false` in its own frontmatter.
ShowToc = true

# Persistent sidebar bio + social links (plan 0004 / D1, ADR 0006). Rendered
# on every page via layouts/partials/sidebar.html, not gated to the
# homepage -- PaperMod has no built-in persistent-sidebar concept, so this
# reuses the theme's homeInfoParams config surface but through a custom
# partial rather than the theme's homepage-only home_info.html.
[params.homeInfoParams]
Title = "Hi, I'm Dave 👋"
Content = "Formerly a Software Engineer and Technical Program Manager at Xbox/Microsoft. I write about game development, cloud, and AI/agents — plus whatever I'm building on the side."
Avatar = "/images/posts/Dave_Debbie.jpeg"

[[params.socialIcons]]
name = 'linkedin'
url = 'https://www.linkedin.com/in/davevoyles/'

[[params.socialIcons]]
name = 'github'
url = 'https://github.com/davevoyles'

[[menu.main]]
identifier = 'tags'
name = 'Tags'
url = '/tags/'
weight = 10

[[menu.main]]
identifier = 'archives'
name = 'Archives'
url = '/archives/'
weight = 20

[[menu.main]]
identifier = 'search'
name = 'Search'
url = '/search/'
weight = 30

[[menu.main]]
identifier = 'graph'
name = 'Graph'
url = '/graph/'
weight = 40
